name: Deploy Sky365 Knowledge Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build visual documentation site
        run: python scripts/build_site.py

      - name: Verify generated site
        run: |
          test -f _site/index.html
          test -f _site/docs-index.html
          test -f _site/investment/index.html
          find _site -name "*.html" -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
